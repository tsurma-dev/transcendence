<!-- This is the main HTML file for the Transcendence Pong game

=================================
FILE STRUCTURE AND EXECUTION FLOW
================================= 

This file is located in the `src` directory of the frontend. This is where you can make
changes to the HTML structure and templates used in the application.

This file contains the HTML structure, including templates for different screens
(Start page, Login, Register, PlayerSetup, Game Screen etc). It uses Tailwind CSS for styling,
which is written inline in the HTML file. The templates are defined using `<template>` tags,
which will be used by the TypeScript code to render the appropriate screens.

When running the application, the HTML file is loaded first, which initializes the app and sets up the screens. 
All interactions and server communication are managed through index.ts. 

The dist directory contains the final output files that are served to the browser (index.html, index.js, output.css).

Do not edit files in the dist directory, as they are generated files.

-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transcendence Pong</title>
  <link href="output.css" rel="stylesheet">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body class="min-h-screen bg-gradient-to-br from-yellow-300 via-amber-400 to-orange-400">
  <!-- Global Navigation Button (Back to Start/Log out) -->
  <button 
    id="backToStartBtn" 
    class="fixed top-4 right-4 px-4 py-2 bg-blue-500 hover:bg-red-700 text-white font-bold text-sm rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all duration-150 font-mono uppercase tracking-wider z-50">
    ← Back to Start
  </button>
  <!-- Global Navigation Button (User Profile) -->
  <button 
    id="userProfileBtn"
    class="fixed top-4 left-4 px-4 py-2 bg-blue-500 hover:bg-green-700 text-white font-bold text-sm rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all duration-150 font-mono uppercase tracking-wider z-50">
    User Profile
  </button>
  
  <!-- Main App Container -->
  <div id="app" class="min-h-screen flex items-center justify-center p-4">
  </div>

  <!-- Start Page template -->
  <template id="startPageTemplate">
    <div class="bg-gradient-to-b from-rose-300 to-pink-400 rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] font-mono uppercase tracking-wider p-8 max-w-lg w-full text-center">
      <div class="text-center mb-8">
        <pre class="font-mono text-black text-1xl font-bold drop-shadow-lg">_|_|_|      _|_|    _|      _|    _|_|_|
_|    _|  _|    _|  _|_|    _|  _|      
_|_|_|    _|    _|  _|  _|  _|  _|  _|_|
_|        _|    _|  _|    _|_|  _|    _|
_|          _|_|    _|      _|    _|_|_|</pre>
      </div>
      <p class="font-mono text-black text-1xl font-bold drop-shadow-lg">Choose your game mode </p>
      </p>
      <div class="space-y-4">
        <!-- Quick Play Button -->
        <button 
          id="quickPlayBtn"
          class="w-full px-6 py-4 bg-gradient-to-b from-lime-400 to-green-600 hover:from-lime-300 hover:to-green-500 text-black font-bold text-lg rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all duration-150 font-mono uppercase tracking-wider"
        >
          Quick Play
        </button>
        
        <!-- Login Button -->
        <button 
          id="loginBtn"
          class="w-full px-6 py-4 bg-gradient-to-b from-lime-400 to-green-600 hover:from-lime-300 hover:to-green-500 text-black font-bold text-lg rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all duration-150 font-mono uppercase tracking-wider"
        >
          Login
        </button>
        
        <!-- Register Button -->
        <button 
          id="registerBtn"
          class="w-full px-6 py-4 bg-gradient-to-b from-lime-400 to-green-600 hover:from-lime-300 hover:to-green-500 text-black font-bold text-lg rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all duration-150 font-mono uppercase tracking-wider"
        >
          Register
        </button>
      </div>
    </div>
  </template>

  <!-- Login template -->
  <template id="loginTemplate">
    <div class="bg-gradient-to-b from-rose-300 to-pink-400 rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] font-mono tracking-wider p-8 max-w-lg w-full text-center">
      <div class="text-center mb-8">
        <pre class="font-mono text-black text-1xl font-bold drop-shadow-lg">_|_|_|      _|_|    _|      _|    _|_|_|
_|    _|  _|    _|  _|_|    _|  _|      
_|_|_|    _|    _|  _|  _|  _|  _|  _|_|
_|        _|    _|  _|    _|_|  _|    _|
_|          _|_|    _|      _|    _|_|_|</pre>
      </div>
      
      <!-- Login Credentials Form -->
      <div id="loginCredentialsSection">
        <form id="loginForm" class="space-y-4">
          <input type="email" name="email" placeholder="Email" required 
              class="w-full p-4 rounded-none bg-white/90 text-gray-800 border-4 border-black outline-none focus:ring-4 focus:ring-blue-400/50 transition-all font-mono" />
          <input type="password" name="password" placeholder="Password" required 
              class="w-full p-4 rounded-none bg-white/90 text-gray-800 border-4 border-black outline-none focus:ring-4 focus:ring-blue-400/50 transition-all font-mono" />
          <button type="submit" 
              class="w-full px-6 py-4 bg-gradient-to-b from-lime-400 to-green-600 hover:from-lime-300 hover:to-green-500 text-black font-bold text-lg rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all duration-150 font-mono uppercase tracking-wider">
            Login
          </button>
        </form>
        <div class="text-black text-center mt-4 font-mono">
          Don't have an account? <button id="showRegisterBtn" class="text-black underline cursor-pointer font-bold hover:text-gray-700">Register here</button>
        </div>
      </div>

      <!-- 2FA Verification Section (hidden by default) -->
      <div id="twoFAVerificationSection" class="hidden">
        <div class="text-black text-center mb-4 font-mono">
          <h3 class="text-lg font-bold mb-2">Two-Factor Authentication Required</h3>
          <p class="text-sm">Enter the 6-digit code from your authenticator app</p>
        </div>
        
        <form id="twoFAVerificationForm" class="space-y-4">
          <input type="text" id="twoFACode" name="twoFACode" placeholder="Enter 6-digit code" required 
              maxlength="6" pattern="[0-9]{6}" autocomplete="off"
              class="w-full p-4 rounded-none bg-white/90 text-gray-800 border-4 border-black outline-none focus:ring-4 focus:ring-blue-400/50 transition-all font-mono text-center text-2xl tracking-widest" />
          <button type="submit" 
              class="w-full px-6 py-4 bg-gradient-to-b from-lime-400 to-green-600 hover:from-lime-300 hover:to-green-500 text-black font-bold text-lg rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all duration-150 font-mono uppercase tracking-wider">
            Verify Code
          </button>
        </form>
        
        <div class="text-black text-center mt-4 font-mono">
          <button id="backToCredentialsBtn" class="text-black underline cursor-pointer font-bold hover:text-gray-700">← Back to Login</button>
        </div>
      </div>

      <div id="loginError" class="text-red-500 text-center mt-4 hidden"></div>
    </div>
  </template>

  <!-- Register template -->
  <template id="registerTemplate">
    <div class="bg-gradient-to-b from-rose-300 to-pink-400 rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] font-mono tracking-wider p-8 max-w-lg w-full text-center">
      <div class="text-center mb-8">
        <pre class="font-mono text-black text-1xl font-bold drop-shadow-lg">_|_|_|      _|_|    _|      _|    _|_|_|
_|    _|  _|    _|  _|_|    _|  _|      
_|_|_|    _|    _|  _|  _|  _|  _|  _|_|
_|        _|    _|  _|    _|_|  _|    _|
_|          _|_|    _|      _|    _|_|_|</pre>
      </div>
      <form id="registerForm" class="space-y-4">
        <input type="text" name="username" placeholder="Username" required maxlength="15" 
            class="w-full p-4 rounded-none bg-white/90 text-gray-800 border-4 border-black outline-none focus:ring-4 focus:ring-blue-400/50 transition-all font-mono" />
        <input type="email" name="email" placeholder="Email" required 
            class="w-full p-4 rounded-none bg-white/90 text-gray-800 border-4 border-black outline-none focus:ring-4 focus:ring-blue-400/50 transition-all font-mono" />
        <input type="password" name="password" placeholder="Password" required 
            class="w-full p-4 rounded-none bg-white/90 text-gray-800 border-4 border-black outline-none focus:ring-4 focus:ring-blue-400/50 transition-all font-mono" />
        <button type="submit" 
            class="w-full px-6 py-4 bg-gradient-to-b from-lime-400 to-green-600 hover:from-lime-300 hover:to-green-500 text-black font-bold text-lg rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all duration-150 font-mono uppercase tracking-wider">
          Register
        </button>
      </form>
      <div id="registerError" class="text-red-500 text-center mt-4 hidden"></div>
      <div class="text-black text-center mt-4 font-mono">
        Already have an account? <button id="showLoginBtn" class="text-black underline cursor-pointer font-bold hover:text-gray-700">Login here</button>
      </div>
    </div>
  </template>

  <!-- Logged out template -->
  <template id="loggedOutTemplate">
    <div class="bg-gradient-to-b from-rose-300 to-pink-400 rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] font-mono uppercase tracking-wider p-8 max-w-lg w-full text-center">
      <h1 class="text-4xl font-bold text-white mb-4 drop-shadow-lg">
        User successfully logged out
      </h1>
      <p class="font-mono text-black text-lg">
        You can now close this window or return to the start page
      </p>
    </div>
  </template>

  <!-- User profile template -->
  <template id="userProfileTemplate">
    <div class="bg-gradient-to-b from-rose-300 to-pink-400 rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] font-mono uppercase tracking-wider p-8 max-w-lg w-full text-center">
      <h1 class="text-4xl font-bold text-white mb-4 drop-shadow-lg">
        User Profile
      </h1>
      <!-- User avatar -->
      <div class="mb-6">
        <img 
          id="profileAvatar"
          src="images/default_avatar.jpg"
          alt="User Avatar"
          class="w-32 h-32 rounded-full border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] mx-auto mb-4"
        >
        <!-- Online status indicator -->
        <div class="flex items-center justify-center">
          <div id="onlineStatusDot" class="w-3 h-3 rounded-full mr-2 bg-green-400"></div>
          <span id="onlineStatusText" class="text-black font-mono text-sm font-bold">Online</span>
        </div>
      </div>
      <!-- User information -->
      <div class="flex justify-center mb-4">
        <div class="text-black text-lg text-left">
          <p class="font-mono flex"><span class="w-40">Username:</span><span id="profileUsername" class="font-bold"></span></p>
          <p class="font-mono flex"><span class="w-40">Email:</span><span id="profileEmail" class="font-bold"></span></p>
          <p class="font-mono flex"><span class="w-40">Joined:</span><span id="profileJoinedDate" class="font-bold"></span></p>
          <p class="font-mono flex"><span class="w-40">Total Games:</span><span id="profileTotalGames" class="font-bold"></span></p>
          <p class="font-mono flex"><span class="w-40">Games Won:</span><span id="profileGamesWon" class="font-bold"></span></p>
        </div>
      </div>
      <div class="space-y-4">
        <button 
          id="userSettingsBtn"
          class="w-full px-6 py-4 bg-gradient-to-b from-lime-400 to-green-600 hover:from-lime-300 hover:to-green-500 text-black font-bold text-lg rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all duration-150 font-mono uppercase tracking-wider">
          User Settings
        </button>
      </div>
    </div>
  </template>

  <!-- User settings template -->
  <template id="userSettingsTemplate">
    <div class="bg-gradient-to-b from-rose-300 to-pink-400 rounded-none border-4 border-black shadow-[4px_4px_0px_0px rgba(0,0,0,1)] font-mono uppercase tracking-wider p-8 max-w-2xl w-full text-center">
      <h1 class="text-4xl font-bold text-white mb-4 drop-shadow-lg">
        User Settings
      </h1>
      <form id="updatePasswordForm" class="mb-6">
        <h2 class="text-2xl font-semibold text-black mb-4">Change Password</h2>
        <label class="block mb-2">
          New Password:
          <input type="password" name="password" required 
            class="w-full p-4 rounded-none bg-white/90 text-gray-800 border-4 border-black outline-none focus:ring-4 focus:ring-blue-400/50 transition-all font-mono" />
        </label>
        <button type="submit" 
          class="w-full px-6 py-4 bg-gradient-to-b from-lime-400 to-green-600 hover:from-lime-300 hover:to-green-500 text-black font-bold text-lg rounded-none border-4 border-black shadow-[4px_4px_0px_0px rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all duration-150 font-mono uppercase tracking-wider">
          Update Password
        </button>
        <div id="passwordResponse" class="text-black text-left mt-2 hidden"></div>
      </form>
      <form id="updateEmailForm" class="mb-6">
        <h2 class="text-2xl font-semibold text-black mb-4">Change Email</h2>
        <label class="block mb-2">
          New Email:
          <input type="email" name="email" required 
            class="w-full p-4 rounded-none bg-white/90 text-gray-800 border-4 border-black outline-none focus:ring-4 focus:ring-blue-400/50 transition-all font-mono" />
        </label>
        <button type="submit" 
          class="w-full px-6 py-4 bg-gradient-to-b from-lime-400 to-green-600 hover:from-lime-300 hover:to-green-500 text-black font-bold text-lg rounded-none border-4 border-black shadow-[4px_4px_0px_0px rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all duration-150  font-mono uppercase tracking-wider">
          Update Email
        </button>
        <div id="emailResponse" class="text-black text-left mt-2 hidden"></div>
      </form>
      <form id="updateUsernameForm" class="mb-6">
        <h2 class="text-2xl font-semibold text-black mb-4">Change Username</h2>
        <label class="block mb-2">
          New Username:
          <input type="text" name="username" required maxlength="15"
            class="w-full p-4 rounded-none bg-white/90 text-gray-800 border-4 border-black outline-none focus:ring-4 focus:ring-blue-400/50 transition-all font-mono" />
        </label>
        <button type="submit" 
          class="w-full px-6 py-4 bg-gradient-to-b from-lime-400 to-green-600 hover:from-lime-300 hover:to-green-500 text-black font-bold text-lg rounded-none border-4 border-black shadow-[4px_4px_0px_0px rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all duration-150 font-mono uppercase tracking-wider">
          Update Username
        </button>
        <div id="usernameResponse" class="text-black text-left mt-2 hidden"></div>
      </form>
      <div class="mb-6 p-6 border-4 border-black rounded-none shadow-[4px_4px_0px_0px rgba(0,0,0,1)]">
        <h2 class="text-2xl font-semibold text-black mb-4">Two-Factor Authentication</h2>
        <div class="text-center mb-4">
          <span class="text-black font-mono text-lg">2FA Status: </span>
          <span id="twoFAStatus" class="text-black font-bold font-mono">Loading...</span>
        </div>
        <div id="twoFAControls" class="space-y-4">
          <!-- Enable 2FA Button (shown when 2FA is disabled) -->
          <button 
            id="enable2FABtn"
            class="w-full px-6 py-4 bg-gradient-to-b from-blue-400 to-blue-600 hover:from-blue-300 hover:to-blue-500 text-white font-bold text-lg rounded-none border-4 border-black shadow-[4px_4px_0px_0px rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all duration-150 font-mono uppercase tracking-wider hidden">
            Enable 2FA
          </button>
          
          <!-- Disable 2FA Button (shown when 2FA is enabled) -->
          <button 
            id="disable2FABtn"
            class="w-full px-6 py-4 bg-gradient-to-b from-orange-400 to-orange-600 hover:from-orange-300 hover:to-orange-500 text-white font-bold text-lg rounded-none border-4 border-black shadow-[4px_4px_0px_0px rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all duration-150 font-mono uppercase tracking-wider hidden">
            Disable 2FA
          </button>
          
          <!-- QR Code Display (shown during 2FA setup) -->
          <div id="qrCodeSection" class="text-center hidden">
            <p class="text-black font-mono mb-4">Scan this QR code with your authenticator app:</p>
            <div id="qrCodeContainer" class="bg-white p-4 border-4 border-black inline-block mb-4"></div>
            <p class="text-black font-mono text-sm mb-4">Or enter this secret manually: <span id="manualSecret" class="font-bold"></span></p>
            <input 
              type="text" 
              id="verificationCode" 
              placeholder="Enter 6-digit code from your app" 
              maxlength="6"
              class="w-full p-4 rounded-none bg-white/90 text-gray-800 border-4 border-black outline-none focus:ring-4 focus:ring-blue-400/50 transition-all font-mono mb-4" />
            <button 
              id="verify2FABtn"
              class="w-full px-6 py-4 bg-gradient-to-b from-green-400 to-green-600 hover:from-green-300 hover:to-green-500 text-white font-bold text-lg rounded-none border-4 border-black shadow-[4px_4px_0px_0px rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all duration-150 font-mono uppercase tracking-wider">
              Verify & Enable 2FA
            </button>
          </div>
        </div>
        <div id="twoFAResponse" class="text-black text-left mt-2 hidden"></div>
      </div>
      <form id="deleteAccountForm" class="mb-6">
        <h2 class="text-2xl font-semibold text-black mb-4">Delete Account</h2>
        <label class="block mb-2">
          Confirm Password:
          <input type="password" name="password" required 
            class="w-full p-4 rounded-none bg-white/90 text-gray-800 border-4 border-black outline-none focus:ring-4 focus:ring-blue-400/50 transition-all font-mono" />
        </label>
        <button type="submit" 
          class="w-full px-6 py-4 bg-gradient-to-b from-red-400 to-red-600 hover:from-red-300 hover:to-red-500 text-white font-bold text-lg rounded-none border-4 border-black shadow-[4px_4px_0px_0px rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px rgba(0,0,0,1)] hover:translate  -x-[2px] hover:translate-y-[2px] transition-all duration-150 font-mono uppercase tracking-wider">
          Delete My Account
        </button>
        <div id="deleteResponse" class="text-black text-left mt-2 hidden"></div>
      </form>
    </div>
  </template>

  <!-- Player Setup Template -->
  <template id="playerSetupTemplate">
    <div class="bg-gradient-to-b from-rose-300 to-pink-400 rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] font-mono uppercase tracking-wider p-8 max-w-2xl w-full relative">
      
      <!-- Online Users Counter -->
      <div class="text-center mb-4">
        <div class="inline-flex items-center bg-gradient-to-b from-gray-300 to-gray-400 px-4 py-2 rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] font-mono uppercase tracking-wider">
          <div class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse"></div>
          <span id="onlineUsersCount" class="text-black text-sm font-bold">
            Loading...
          </span>
        </div>
      </div>

      <div class="text-center mb-8">
        <pre class="font-mono text-black text-1xl font-bold drop-shadow-lg">_|_|_|      _|_|    _|      _|    _|_|_|
_|    _|  _|    _|  _|_|    _|  _|      
_|_|_|    _|    _|  _|  _|  _|  _|  _|_|
_|        _|    _|  _|    _|_|  _|    _|
_|          _|_|    _|      _|    _|_|_|</pre>
      </div>
      
      <div class="grid md:grid-cols-2 gap-8 mb-8">
        <!-- Player 1 Input -->
        <div class="p-6 border-4 border-black rounded-none shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
          <h3 class="text-2xl font-semibold text-black mb-4 text-center font-mono uppercase tracking-wider">Player 1</h3>
          <input 
            type="text" 
            id="player1Name" 
            placeholder="Enter your name" 
            maxlength="15"
            class="w-full p-4 rounded-none bg-white/90 text-gray-800 text-center font-semibold text-lg border-4 border-black outline-none focus:ring-4 focus:ring-blue-400/50 transition-all font-mono"
          >
          <div class="text-black text-center mt-3 text-sm font-mono uppercase tracking-wider">
            Controls: <span class="font-semibold">W</span> / <span class="font-semibold">S</span>
          </div>
        </div>
        
        <!-- Player 2 Input -->
        <div class="p-6 border-4 border-black rounded-none shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
          <h3 class="text-2xl font-semibold text-black mb-4 text-center font-mono uppercase tracking-wider">Player 2</h3>
          <input 
            type="text" 
            id="player2Name" 
            placeholder="Enter your name" 
            maxlength="15"
            class="w-full p-4 rounded-none bg-white/90 text-gray-800 text-center font-semibold text-lg border-4 border-black outline-none focus:ring-4 focus:ring-blue-400/50 transition-all font-mono"
          >
          <div class="text-black text-center mt-3 text-sm font-mono uppercase tracking-wider">
            Controls: <span class="font-semibold">↑</span> / <span class="font-semibold">↓</span>
          </div>
        </div>
      </div>
      
      <div class="text-center">
        <button 
          id="startGameBtn" 
          disabled
          class="w-full px-6 py-4 bg-gradient-to-b from-lime-400 to-green-600 hover:from-lime-300 hover:to-green-500 text-black font-bold text-lg rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all duration-150 font-mono uppercase tracking-wider">
          START GAME
        </button>
      </div>
    </div>
  </template>

  <!-- Game Screen Template -->
  <template id="gameScreenTemplate">
    <div class="bg-gradient-to-b from-rose-300 to-pink-400 rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] font-mono uppercase tracking-wider p-8 max-w-4xl w-full relative">
      
      <!-- Players Display with Scores -->
      <div class="flex justify-between items-center mb-6">
        <div class="border-4 border-black rounded-none shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] px-6 py-4 min-w-[200px] text-center">
          <div class="text-black text-sm mb-1 font-mono uppercase tracking-wider">Player 1</div>
          <div id="player1Display" class="text-black font-semibold text-lg font-mono">Player 1</div>
          <div id="player1Score" class="text-black text-4xl font-bold mt-2 font-mono">0</div>
        </div>
        
        <div class="text-black text-2xl font-bold px-4 font-mono">VS</div>
        
        <div class="border-4 border-black rounded-none shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] px-6 py-4 min-w-[200px] text-center">
          <div class="text-black text-sm mb-1 font-mono uppercase tracking-wider">Player 2</div>
          <div id="player2Display" class="text-black font-semibold text-lg font-mono">Player 2</div>
          <div id="player2Score" class="text-black text-4xl font-bold mt-2 font-mono">0</div>
        </div>
      </div>

      <!-- Game Canvas -->
      <div class="relative">
        <canvas 
          id="pongCanvas" 
          width="800" 
          height="400" 
          class="bg-black border-4 border-black rounded-none shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]"
        ></canvas>
      </div>

      <!-- Controls Info -->
      <div class="text-black text-center mt-4 text-sm space-y-1 font-mono uppercase tracking-wider">
        <div><strong id="player1Controls">Player 1:</strong> W (Up) / S (Down)</div>
        <div><strong id="player2Controls">Player 2:</strong> ↑ (Up) / ↓ (Down)</div>
      </div>
    </div>
  </template>

  <script type="module" src="index.js"></script>
</body>
</html>
