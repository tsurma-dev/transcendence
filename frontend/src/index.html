<!-- This is the main HTML file for the Transcendence Pong game

=================================
FILE STRUCTURE AND EXECUTION FLOW
================================= 

This file is located in the `src` directory of the frontend. This is where you can make
changes to the HTML structure and templates used in the application.

This file contains the HTML structure, including templates for different screens
(Start page, Login, Register, PlayerSetup, Game Screen etc). It uses Tailwind CSS for styling,
which is written inline in the HTML file. The templates are defined using `<template>` tags,
which will be used by the TypeScript code to render the appropriate screens.

When running the application, the HTML file is loaded first, which initializes the app and sets up the screens. 
All interactions and server communication are managed through index.ts. 

The dist directory contains the final output files that are served to the browser (index.html, index.js, output.css).

Do not edit files in the dist directory, as they are generated files.

-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transcendence Pong</title>
  <!-- CSS is handled by Vite through index.ts -->
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body class="min-h-screen bg-gradient-to-br from-yellow-300 via-amber-400 to-orange-400">
  <!-- Global Navigation Menu for logged-in users -->
  <div id="userMenuWrapper" class="fixed top-4 right-4 z-50" style="display: none;">
    <!-- Menu Toggle Button shows username -->
    <button
      id="userProfileBtn"
      class="menu-btn-blue">
      <!-- Username will be inserted here -->
      <span id="userProfileName">User</span>
      <span class="ml-2">▾</span>
    </button>
    <!-- Dropdown Menu -->
    <div id="userMenuDropdown" class="hidden mt-2 w-40 bg-white border border-gray-300 rounded shadow-lg">
      <button id="startGameMenuBtn" class="menu-btn-blue">Start Game</button>
      <button id="profileMenuBtn" class="menu-btn-blue">Profile</button>
      <button id="settingsMenuBtn" class="menu-btn-blue">Settings</button>
      <button id="logoutMenuBtn" class="menu-btn-blue">Log Out</button>
    </div>
    <!-- Back to Start Button for non-logged-in users -->
    <button
      id="backMenuBtn"
      class="menu-btn-blue hidden"
    >
      ← Back to Start
    </button>
  </div>
  
  <!-- Main App Container -->
  <div id="app" class="min-h-screen flex items-center justify-center p-4">
  </div>

  <!-- Start Page template -->
  <template id="startPageTemplate">
    <div class="container-main-pink max-w-lg">
      <div class="text-center mb-8">
        <pre class="font-mono text-black text-1xl font-bold drop-shadow-lg">_|_|_|      _|_|    _|      _|    _|_|_|
_|    _|  _|    _|  _|_|    _|  _|      
_|_|_|    _|    _|  _|  _|  _|  _|  _|_|
_|        _|    _|  _|    _|_|  _|    _|
_|          _|_|    _|      _|    _|_|_|</pre>
      </div>
      <p class="font-mono text-black text-1xl font-bold drop-shadow-lg">Choose your game mode </p>
      </p>
      <div class="space-y-4">
        <!-- Quick Play Button -->
        <button 
          id="quickPlayBtn"
          class="btn-green"
        >
          Quick Play
        </button>
        
        <!-- Login Button -->
        <button 
          id="loginBtn"
          class="btn-green"
        >
          Login
        </button>
        
        <!-- Register Button -->
        <button 
          id="registerBtn"
          class="btn-green"
        >
          Register
        </button>
      </div>
    </div>
  </template>

  <!-- Login template -->
  <template id="loginTemplate">
    <div class="container-main-pink max-w-lg">
      <div class="text-center mb-8">
        <pre class="font-mono text-black text-1xl font-bold drop-shadow-lg">_|_|_|      _|_|    _|      _|    _|_|_|
_|    _|  _|    _|  _|_|    _|  _|      
_|_|_|    _|    _|  _|  _|  _|  _|  _|_|
_|        _|    _|  _|    _|_|  _|    _|
_|          _|_|    _|      _|    _|_|_|</pre>
      </div>
      
      <!-- Login Credentials Form -->
      <div id="loginCredentialsSection">
        <form id="loginForm" class="space-y-4">
          <input type="email" name="email" placeholder="Email" required 
              class="input-white" />
          <input type="password" name="password" placeholder="Password" required 
              class="input-white" />
          <button type="submit" 
              class="btn-green">
            Login
          </button>
        </form>
        <div class="text-black text-center mt-4 font-mono">
          Don't have an account? <button id="showRegisterBtn" class="text-black underline cursor-pointer font-bold hover:text-gray-700">Register here</button>
        </div>
      </div>

      <!-- 2FA Verification Section (hidden by default) -->
      <div id="twoFAVerificationSection" class="hidden">
        <div class="text-black text-center mb-4 font-mono">
          <h3 class="text-lg font-bold mb-2">Two-Factor Authentication Required</h3>
          <p class="text-sm">Enter the 6-digit code from your authenticator app</p>
        </div>
        
        <form id="twoFAVerificationForm" class="space-y-4">
          <input type="text" id="twoFACode" name="twoFACode" placeholder="Enter 6-digit code" required 
              maxlength="6" pattern="[0-9]{6}" autocomplete="off"
              class="input-white text-center text-2xl tracking-widest" />
          <button type="submit" 
              class="btn-green">
            Verify Code
          </button>
        </form>
        
        <div class="text-black text-center mt-4 font-mono">
          <button id="backToCredentialsBtn" class="text-black underline cursor-pointer font-bold hover:text-gray-700">← Back to Login</button>
        </div>
      </div>

      <div id="loginError" class="text-red-500 text-center mt-4 hidden"></div>
    </div>
  </template>

  <!-- Register template -->
  <template id="registerTemplate">
    <div class="container-main-pink max-w-lg">
      <div class="text-center mb-8">
        <pre class="font-mono text-black text-1xl font-bold drop-shadow-lg">_|_|_|      _|_|    _|      _|    _|_|_|
_|    _|  _|    _|  _|_|    _|  _|      
_|_|_|    _|    _|  _|  _|  _|  _|  _|_|
_|        _|    _|  _|    _|_|  _|    _|
_|          _|_|    _|      _|    _|_|_|</pre>
      </div>
      <form id="registerForm" class="space-y-4">
        <input type="text" name="username" placeholder="Username" required maxlength="15" 
            class="input-white" />
        <input type="email" name="email" placeholder="Email" required 
            class="input-white" />
        <input type="password" name="password" placeholder="Password" required 
            class="input-white" />
        <button type="submit" 
            class="btn-green">
          Register
        </button>
      </form>
      <div id="registerError" class="text-red-500 text-center mt-4 hidden"></div>
      <div class="text-black text-center mt-4 font-mono">
        Already have an account? <button id="showLoginBtn" class="text-black underline cursor-pointer font-bold hover:text-gray-700">Login here</button>
      </div>
    </div>
  </template>

  <!-- Logged out template -->
  <template id="loggedOutTemplate">
    <div class="container-main-pink max-w-lg">
      <h1 class="text-4xl font-bold text-white mb-4 drop-shadow-lg">
        User successfully logged out
      </h1>
      <p class="font-mono text-black text-lg">
        You can now close this window or return to the start page
      </p>
    </div>
  </template>

  <!-- Authentication Error template -->
  <template id="authErrorTemplate">
    <div class="container-main-pink max-w-lg">
      <div class="text-center mb-8">
        <div class="text-6xl mb-4">🔒</div>
        <h1 class="text-4xl font-bold text-white mb-4 drop-shadow-lg">
          Authentication Required
        </h1>
        <p class="font-mono text-black text-lg mb-6">
          You need to be logged in to access this page
        </p>
      </div>
      
      <div class="space-y-4">
        <button 
          id="authErrorLoginBtn"
          class="btn-green w-full">
          Log in
        </button>
        
        <button 
          id="authErrorRegisterBtn"
          class="btn-blue w-full">
          Register
        </button>
      </div>
      

    </div>
  </template>

  <!-- User profile template -->
  <template id="userProfileTemplate">
    <div class="container-main-pink max-w-lg">
      <h1 class="text-4xl font-bold text-white mb-4 drop-shadow-lg">
        User Profile
      </h1>
      <!-- User avatar -->
      <div class="mb-6">
        <div class="relative inline-block">
          <img 
            id="profileAvatar"
            src="images/default_avatar.jpg"
            alt="User Avatar"
            class="w-32 h-32 rounded-full border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] mx-auto mb-4"
          >
          <!-- Avatar menu button -->
          <div class="relative">
            <button id="avatarMenuBtn" class="absolute bottom-2 right-2 w-8 h-8 bg-blue-500 hover:bg-blue-600 border-2 border-black rounded-full flex items-center justify-center cursor-pointer shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:shadow-[1px_1px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[1px] hover:translate-y-[1px] transition-all duration-150">
              <span class="text-white text-sm font-bold">📷</span>
            </button>
            <!-- Avatar dropdown menu -->
            <div id="avatarMenuDropdown" class="hidden absolute bottom-10 right-0 w-48 bg-white border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] z-10">
              <button id="uploadAvatarBtn" class="block w-full text-left px-4 py-2 hover:bg-gray-100 border-b border-gray-300 font-mono uppercase text-sm font-bold">
                📁 Upload Profile Picture
              </button>
              <button id="deleteAvatarBtn" class="block w-full text-left px-4 py-2 hover:bg-gray-100 font-mono uppercase text-sm font-bold text-red-600">
                🗑️ Delete Profile Picture
              </button>
            </div>
            <input 
              type="file" 
              id="avatarFileInput" 
              accept="image/png" 
              class="hidden"
            >
          </div>
        </div>
        <!-- Avatar upload progress and status -->
        <div id="avatarUploadStatus" class="mt-2 text-center text-sm font-mono hidden">
          <progress id="avatarUploadProgress" value="0" max="100" class="w-full h-2 rounded-none border-2 border-black hidden"></progress>
          <div id="avatarStatusMessage" class="mt-1"></div>
        </div>
        <!-- Online status indicator -->
        <div class="flex items-center justify-center">
          <div id="onlineStatusDot" class="w-3 h-3 rounded-full mr-2 bg-green-400"></div>
          <span id="onlineStatusText" class="text-content font-bold">Online</span>
        </div>
        
        <!-- Friend action buttons (only visible for other users' profiles) -->
        <div id="friendActionContainer" class="mt-4 flex justify-center">
          <!-- Add Friend Button -->
          <button 
            id="addFriendBtn"
            class="hidden btn-friend bg-gradient-to-b from-green-400 to-green-600 hover:from-green-300 hover:to-green-500 text-white">
            ➕ Add Friend
          </button>
          
          <!-- Friend Request Sent Button -->
          <button 
            id="friendRequestSentBtn"
            class="hidden btn-friend bg-gradient-to-b from-yellow-400 to-yellow-600 text-black cursor-default">
            ⏳ Friend Request Sent
          </button>
          
          <!-- Already Friends Button -->
          <div id="alreadyFriendsContainer" class="hidden relative">
            <button 
              id="alreadyFriendsBtn"
              class="btn-friend bg-gradient-to-b from-blue-400 to-blue-600 hover:from-blue-300 hover:to-blue-500 text-white">
              ✅ Friends ▾
            </button>
            <!-- Friends dropdown menu -->
            <div id="friendsActionDropdown" class="hidden absolute top-full left-0 w-full mt-1 bg-white border-2 border-black rounded shadow-lg z-10">
              <button 
                id="removeFriendBtn"
                class="block w-full text-left px-4 py-2 hover:bg-red-50 border-b border-gray-300 font-mono uppercase text-sm font-bold text-red-600">
                🗑️ Unfriend
              </button>
            </div>
          </div>
          
          <!-- Accept/Reject Friend Request Container (when someone sent you a request) -->
          <div id="friendRequestActions" class="hidden flex gap-2">
            <button 
              id="acceptFriendBtn"
              class="btn-friend bg-gradient-to-b from-green-400 to-green-600 hover:from-green-300 hover:to-green-500 text-white">
              ✅ Accept Request
            </button>
            <button 
              id="rejectFriendBtn"
              class="btn-friend bg-gradient-to-b from-red-400 to-red-600 hover:from-red-300 hover:to-red-500 text-white">
              ❌ Reject Request
            </button>
          </div>
        </div>
      </div>
      <!-- User information -->
      <div class="flex justify-center mb-4">
        <div class="text-black text-lg text-left">
          <p class="font-mono flex"><span class="w-40">Username:</span><span id="profileUsername" class="font-bold"></span></p>
          <p class="font-mono flex"><span class="w-40">Email:</span><span id="profileEmail" class="font-bold"></span></p>
          <p class="font-mono flex"><span class="w-40">Joined:</span><span id="profileJoinedDate" class="font-bold"></span></p>
        </div>
      </div>
      <div class="space-y-4">
        <button 
          id="matchHistoryBtn"
          class="btn-purple">
          Match History
        </button>
        
        <!-- Friends Button with Dropdown (only visible for own profile) -->
        <div id="friendsListContainer" class="relative">
          <button 
            id="friendsListBtn"
            class="btn-blue w-full relative">
            Friends
            <span id="friendsNotificationBadge" class="hidden absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center animate-pulse">!</span>
          </button>
          
          <!-- Friends List Dropdown -->
          <div id="friendsListDropdown" class="hidden absolute top-full left-0 w-full mt-1 bg-white border-2 border-black rounded shadow-lg z-10 max-h-64 overflow-y-auto">
            <div class="p-3">
              <!-- Friends Section -->
              <div id="friendsSection" class="mb-4">
                <h4 class="font-bold text-black mb-2 font-mono">Friends</h4>
                <div id="friendsList" class="space-y-1">
                  <!-- Friends will be loaded here -->
                  <div class="text-gray-500 font-mono text-sm text-center py-2">
                    No friends yet
                  </div>
                  
                  <!-- Friend Item Template (inline) -->
                  <template id="friendItemTemplate">
                    <div class="py-2 px-3 border-b border-gray-200 flex items-center">
                      <div class="indicator-offline"></div>
                      <span class="text-sm text-blue-600 hover:text-blue-800 cursor-pointer underline font-semibold friend-username"></span>
                    </div>
                  </template>
                </div>
              </div>
              
              <!-- Pending Requests Section -->
              <div id="pendingRequestsSection">
                <h4 class="font-bold text-black mb-2 font-mono">Pending Requests</h4>
                <div id="pendingRequestsList" class="space-y-1">
                  <!-- Pending requests will be loaded here -->
                  <div class="text-gray-500 font-mono text-sm text-center py-2">
                    No pending requests
                  </div>
                  
                  <!-- Pending Request Item Template (inline) -->
                  <template id="pendingRequestItemTemplate">
                    <div class="py-2 px-3 border-b border-gray-200">
                      <span class="text-sm">Friend request from <span class="text-blue-600 hover:text-blue-800 cursor-pointer underline font-semibold pending-request-username"></span></span>
                    </div>
                  </template>
                </div>
              </div>
            </div>
          </div>
        </div>
        
        <button 
          id="userSettingsBtn"
          class="btn-green">
          User Settings
        </button>
      </div>
    </div>
  </template>

  <!-- User settings template -->
  <template id="userSettingsTemplate">
    <div class="container-main-pink max-w-2xl">
      <h1 class="text-4xl font-bold text-white mb-4 drop-shadow-lg">
        User Settings
      </h1>
      <form id="updatePasswordForm" class="mb-6">
        <h2 class="text-2xl font-semibold text-black mb-4">Change Password</h2>
        <label class="block mb-2">
          Current Password:
          <input type="password" name="currentPassword" required 
            class="input-white" />
        </label>
        <label class="block mb-2">
          New Password:
          <input type="password" name="password" required 
            class="input-white" />
        </label>
        <button type="submit" 
          class="btn-green">
          Update Password
        </button>
        <div id="passwordResponse" class="text-content hidden"></div>
      </form>
      <form id="updateEmailForm" class="mb-6">
        <h2 class="text-2xl font-semibold text-black mb-4">Change Email</h2>
        <label class="block mb-2">
          Current Email:
          <input type="email" name="currentEmail" required 
            class="input-white" />
        </label>
        <label class="block mb-2">
          New Email:
          <input type="email" name="email" required 
            class="input-white" />
        </label>
        <label class="block mb-2">
          Confirm Password:
          <input type="password" name="currentPassword" required 
            class="input-white" />
        </label>
        <button type="submit" 
          class="btn-green">
          Update Email
        </button>
        <div id="emailResponse" class="text-content hidden"></div>
      </form>
      <form id="updateUsernameForm" class="mb-6">
        <h2 class="text-2xl font-semibold text-black mb-4">Change Username</h2>
        <label class="block mb-2">
          New Username:
          <input type="text" name="username" required maxlength="15"
            class="input-white" />
        </label>
        <button type="submit" 
          class="btn-green">
          Update Username
        </button>
        <div id="usernameResponse" class="text-content hidden"></div>
      </form>
      <div class="mb-6 p-6 border-4 border-black rounded-none shadow-[4px_4px_0px_0px rgba(0,0,0,1)]">
        <h2 class="text-2xl font-semibold text-black mb-4">Two-Factor Authentication</h2>
        <div class="text-center mb-4">
          <span class="text-black font-mono text-lg">2FA Status: </span>
          <span id="twoFAStatus" class="text-black font-bold font-mono">Loading...</span>
        </div>
        <div id="twoFAControls" class="space-y-4">
          <!-- Enable 2FA Button (shown when 2FA is disabled) -->
          <button 
            id="enable2FABtn"
            class="btn-blue hidden">
            Enable 2FA
          </button>
          
          <!-- Password confirmation for 2FA (shown when enabling 2FA) -->
          <div id="twoFAPasswordSection" class="hidden">
            <h3 class="text-lg font-semibold text-black mb-4">Confirm Password to Enable 2FA</h3>
            <div class="space-y-4">
              <label class="block">
                <span class="text-black font-mono">Current Password:</span>
                <input 
                  type="password" 
                  id="twoFAPassword" 
                  placeholder="Enter your current password" 
                  required 
                  class="input-white" />
              </label>
              <div class="flex space-x-4">
                <button 
                  id="confirmEnable2FABtn"
                  class="btn-green flex-1">
                  Confirm & Continue
                </button>
                <button 
                  id="cancelEnable2FABtn"
                  class="btn-red flex-1">
                  Cancel
                </button>
              </div>
            </div>
          </div>
          
          <!-- Disable 2FA Button (shown when 2FA is enabled) -->
          <button 
            id="disable2FABtn"
            class="btn-red hidden">
            Disable 2FA
          </button>
          
          <!-- QR Code Display (shown during 2FA setup) -->
          <div id="qrCodeSection" class="text-center hidden">
            <p class="text-black font-mono mb-4">Scan this QR code with your authenticator app:</p>
            <div id="qrCodeContainer" class="bg-white p-4 border-4 border-black inline-block mb-4"></div>
            <p class="text-content mb-4">Or enter this secret manually: <span id="manualSecret" class="font-bold"></span></p>
            <input 
              type="text" 
              id="verificationCode" 
              placeholder="Enter 6-digit code from your app" 
              maxlength="6"
              class="input-white mb-4" />
            <button 
              id="verify2FABtn"
              class="btn-green">
              Verify & Enable 2FA
            </button>
          </div>
        </div>
        <div id="twoFAResponse" class="text-content hidden"></div>
      </div>
      <form id="deleteAccountForm" class="mb-6">
        <h2 class="text-2xl font-semibold text-black mb-4">Delete Account</h2>
        <label class="block mb-2">
          Confirm Password:
          <input type="password" name="password" required 
            class="input-white" />
        </label>
        <button type="submit" 
          class="btn-red">
          Delete My Account
        </button>
        <div id="deleteResponse" class="text-content hidden"></div>
      </form>
    </div>
  </template>

  <!-- Match History template -->
  <template id="matchHistoryTemplate">
    <div class="container-main-pink max-w-4xl">
      <h1 class="text-4xl font-bold text-white mb-6 drop-shadow-lg">
        Match History
      </h1>
      
      <!-- Match Statistics Overview -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="container-white p-4">
          <div class="text-black text-2xl font-bold" id="totalMatches">2</div>
          <div class="text-black text-sm font-mono uppercase">Total Matches</div>
        </div>
        <div class="container-white p-4">
          <div class="text-green-600 text-2xl font-bold" id="matchesWon">1</div>
          <div class="text-black text-sm font-mono uppercase">Matches Won</div>
        </div>
        <div class="container-white p-4">
          <div class="text-blue-600 text-2xl font-bold" id="winPercentage">50 %</div>
          <div class="text-black text-sm font-mono uppercase">Win Rate</div>
        </div>
      </div>

      <!-- Match List -->
      <div class="container-white p-6">
        <h2 class="text-2xl font-bold text-black mb-4 font-mono uppercase">Matches</h2>
        
        <!-- Match History Header -->
        <div class="hidden md:grid grid-cols-5 gap-4 mb-4 pb-2 border-b-2 border-black">
          <div class="text-header">Date</div>
          <div class="text-header">Opponent</div>
          <div class="text-header">Score</div>
          <div class="text-header">Result</div>
        </div>

        <!-- Match History Entries -->
        <div id="matchHistoryList" class="space-y-2">
          <!-- Match entries (placeholders) -->
          <div class="grid grid-cols-1 md:grid-cols-5 gap-4 p-3 border-2 border-gray-300 rounded-none hover:bg-gray-50">
            <div class="text-content">
              <span class="md:hidden font-bold">Date: </span>2025-08-19
            </div>
            <div class="text-content">
              <span class="md:hidden font-bold">Opponent: </span>DuckOverflow
            </div>
            <div class="text-content">
              <span class="md:hidden font-bold">Score: </span>5-1
            </div>
            <div class="text-green-600 font-mono text-sm font-bold">
              <span class="md:hidden text-black font-bold">Result: </span>WIN
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-5 gap-4 p-3 border-2 border-gray-300 rounded-none hover:bg-gray-50">
            <div class="text-content">
              <span class="md:hidden font-bold">Date: </span>2025-08-18
            </div>
            <div class="text-content">
              <span class="md:hidden font-bold">Opponent: </span>PongMaster
            </div>
            <div class="text-content">
              <span class="md:hidden font-bold">Score: </span>2-5
            </div>
            <div class="text-red-600 font-mono text-sm font-bold">
              <span class="md:hidden text-black font-bold">Result: </span>LOSS
            </div>
          </div>
        </div>
      </div>

      <!-- Back to Profile Button -->
      <div class="mt-6">
        <button 
          id="backToProfileBtn"
          class="btn-green">
          Back to Profile
        </button>
      </div>
    </div>
  </template>

  <!-- Player Setup Template -->
  <template id="playerSetupTemplate">
    <div class="container-main-pink max-w-2xl relative">

      <div class="text-center mb-8">
        <pre class="font-mono text-black text-1xl font-bold drop-shadow-lg">_|_|_|      _|_|    _|      _|    _|_|_|
_|    _|  _|    _|  _|_|    _|  _|

  <!-- Game Screen Template -->
  <template id="gameScreenTemplate">
    <div class="container-main-pink max-w-4xl relative">
      
      <!-- Players Display with Scores -->
      <div class="flex justify-between items-center mb-6">
        <div class="container-shadowed px-6 py-4 min-w-[200px] text-center">
          <div class="text-black text-sm mb-1 font-mono uppercase tracking-wider">Player 1</div>
          <div id="player1Display" class="text-black font-semibold text-lg font-mono">Player 1</div>
          <div id="player1Score" class="text-black text-4xl font-bold mt-2 font-mono">0</div>
        </div>
        
        <div class="text-black text-2xl font-bold px-4 font-mono">VS</div>
        
        <div class="container-shadowed px-6 py-4 min-w-[200px] text-center">
          <div class="text-black text-sm mb-1 font-mono uppercase tracking-wider">Player 2</div>
          <div id="player2Display" class="text-black font-semibold text-lg font-mono">Player 2</div>
          <div id="player2Score" class="text-black text-4xl font-bold mt-2 font-mono">0</div>
        </div>
      </div>

      <!-- Game Canvas -->
      <div class="relative">
        <canvas 
          id="pongCanvas" 
          width="800" 
          height="400" 
          class="bg-black container-shadowed"
        ></canvas>
      </div>

      <!-- Controls Info -->
      <div class="text-black text-center mt-4 text-sm space-y-1 font-mono uppercase tracking-wider">
        <div><strong id="player1Controls">Player 1:</strong> W (Up) / S (Down)</div>
        <div><strong id="player2Controls">Player 2:</strong> ↑ (Up) / ↓ (Down)</div>
      </div>
    </div>
  </template>

  <!-- Tournament Lobby template -->
  <template id="tournamentLobbyTemplate">
    <div class="container-main-pink max-w-4xl">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-white mb-4 drop-shadow-lg">
          🏆 Tournament Lobby
        </h1>
        <p class="text-black font-mono text-lg">
          Waiting for players to join...
        </p>
      </div>

      <!-- Tournament Info Panel -->
      <div class="container-white p-6 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="text-center">
            <div class="text-black text-2xl font-bold font-mono" id="tournamentPlayers">2</div>
            <div class="text-black text-sm font-mono uppercase">Players Joined</div>
          </div>
          <div class="text-center">
            <div class="text-black text-2xl font-bold font-mono" id="tournamentMaxPlayers">4</div>
            <div class="text-black text-sm font-mono uppercase">Max Players</div>
          </div>
          <div class="text-center">
            <div class="text-black text-2xl font-bold font-mono" id="tournamentStatus">Waiting</div>
            <div class="text-black text-sm font-mono uppercase">Status</div>
          </div>
        </div>
      </div>

      <!-- Players List -->
      <div class="container-white p-6 mb-6">
        <h2 class="text-2xl font-bold text-black mb-4 font-mono uppercase text-center">Players</h2>
        <div id="tournamentPlayersList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Player slots will be populated here -->
          <div class="player-slot flex items-center p-4 container-shadowed bg-gradient-to-r from-green-100 to-green-200">
            <div class="indicator-online"></div>
            <div class="flex-1">
              <div class="text-black font-bold font-mono">Player 1</div>
              <div class="text-content">Ready</div>
            </div>
            <div class="text-green-600 font-bold text-2xl">✓</div>
          </div>
          
          <div class="player-slot flex items-center p-4 container-shadowed bg-gradient-to-r from-green-100 to-green-200">
            <div class="indicator-online"></div>
            <div class="flex-1">
              <div class="text-black font-bold font-mono">Player 2</div>
              <div class="text-content">Ready</div>
            </div>
            <div class="text-green-600 font-bold text-2xl">✓</div>
          </div>
          
          <div class="player-slot flex items-center p-4 container-shadowed bg-gradient-to-r from-gray-100 to-gray-200">
            <div class="indicator-offline"></div>
            <div class="flex-1">
              <div class="text-gray-500 font-bold font-mono">Waiting for player...</div>
              <div class="text-content">Empty slot</div>
            </div>
            <div class="text-gray-400 font-bold text-2xl">⏳</div>
          </div>
          
          <div class="player-slot flex items-center p-4 container-shadowed bg-gradient-to-r from-gray-100 to-gray-200">
            <div class="indicator-offline"></div>
            <div class="flex-1">
              <div class="text-gray-500 font-bold font-mono">Waiting for player...</div>
              <div class="text-content">Empty slot</div>
            </div>
            <div class="text-gray-400 font-bold text-2xl">⏳</div>
          </div>
        </div>
      </div>

      <!-- Tournament Matches -->
      <div class="container-white p-6 mb-6">
        <h2 class="text-2xl font-bold text-black mb-4 font-mono uppercase text-center">Tournament Matches</h2>
        <div class="text-center">
          <div class="inline-block border-2 border-dashed border-gray-400 p-8 rounded-none">
            <div class="text-gray-500 font-mono text-lg mb-2">🏆</div>
            <div class="text-content">Matches will be generated when all players join</div>
          </div>
        </div>
      </div>

      <!-- Tournament Controls -->
      <div class="container-white p-6">
        <div class="flex justify-center">
          <button 
            id="leaveTournamentBtn"
            class="btn-red px-8">
            Leave Tournament
          </button>
        </div>
      </div>
    </div>
  </template>

  <!-- Logged-in Landing Page template -->
  <template id="loggedInLandingTemplate">
    <div class="container-main-pink max-w-lg">
      
      <!-- Online Users Counter -->
      <div class="text-center mb-4 relative">
        <button 
          id="onlineUsersToggle"
          class="inline-flex items-center bg-gradient-to-b from-gray-300 to-gray-400 hover:from-gray-200 hover:to-gray-300 px-4 py-2 rounded-none border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] transition-all duration-150 font-mono uppercase tracking-wider cursor-pointer">
          <div class="indicator-online"></div>
          <span id="onlineUsersCount" class="text-black text-sm font-bold">
            Loading...
          </span>
          <span class="ml-2 text-black text-xs">▾</span>
        </button>
        
        <!-- Online Users Dropdown -->
        <div id="onlineUsersDropdown" class="hidden absolute top-full left-1/2 transform -translate-x-1/2 mt-2 w-64 bg-white border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] z-10">
          <div class="p-4">
            <h3 class="text-black font-mono font-bold text-sm mb-3 text-center uppercase">Currently Online</h3>
            <div id="onlineUsersList" class="space-y-2 max-h-48 overflow-y-auto">
              <!-- Online users will be populated here -->
              <div class="text-center text-gray-500 font-mono text-sm">Loading users...</div>
            </div>
          </div>
        </div>
      </div>

      <h1 class="text-4xl font-bold text-white mb-6 drop-shadow-lg">
        Welcome Back, <span id="welcomeUsername">User</span>!
      </h1>
      <div class="space-y-4">
        <button 
          id="startSinglePlayerBtn"
          class="btn-green">
          Single Player Game
        </button>
        <button 
          id="start2PlayerBtn"
          class="btn-green">
          Remote 2-player Game
        </button>
        <button 
          id="startTournamentBtn"
          class="btn-purple">
          Tournament
        </button>
        <button 
          id="userProfileLandingBtn"
          class="btn-blue">
          User Profile
        </button>
      </div>
    </div>

  <!-- Remote Game template -->
  <template id="remoteGameTemplate">
    <div class="container-main-pink max-w-lg">
      <div class="text-center mb-8">
        <pre class="font-mono text-black text-1xl font-bold drop-shadow-lg">_|_|_|      _|_|    _|      _|    _|_|_|
_|    _|  _|    _|  _|_|    _|  _|      
_|_|_|    _|    _|  _|  _|  _|  _|  _|_|
_|        _|    _|  _|    _|_|  _|    _|
_|          _|_|    _|      _|    _|_|_|</pre>
      </div>
      
      <h1 class="text-4xl font-bold text-white mb-6 drop-shadow-lg text-center">
        Remote Game Options
      </h1>
      
      <div class="space-y-6">
        <!-- Create Room Button -->
        <div class="text-center">
          <button 
            id="createRoomBtn"
            class="btn-green w-full">
            Create Room
          </button>
          <p class="text-black font-mono text-sm mt-2">
            Create a room and invite another player
          </p>
        </div>
        
        <!-- Join Room Button -->
        <div class="text-center">
          <button 
            id="joinRoomBtn"
            class="btn-blue w-full">
            Join Room
          </button>
          <p class="text-black font-mono text-sm mt-2">
            Join an existing room using the room id
          </p>
        </div>
        
        <!-- Get Matched Button -->
        <div class="text-center">
          <button 
            id="getMatchedBtn"
            class="btn-purple w-full">
            Get Matched
          </button>
          <p class="text-black font-mono text-sm mt-2">
            Get matched with a random player
          </p>
        </div>
      </div>
    </div>
  </template>

  <!-- Create Room template -->
  <template id="createRoomTemplate">
    <div class="container-main-pink max-w-lg">
      <div class="text-center mb-8">
        <pre class="font-mono text-black text-1xl font-bold drop-shadow-lg">_|_|_|      _|_|    _|      _|    _|_|_|
_|    _|  _|    _|  _|_|    _|  _|      
_|_|_|    _|    _|  _|  _|  _|  _|  _|_|
_|        _|    _|  _|    _|_|  _|    _|
_|          _|_|    _|      _|    _|_|_|</pre>
      </div>
      
      <h1 class="text-4xl font-bold text-white mb-6 drop-shadow-lg text-center">
        Room Created!
      </h1>
      
      <!-- Room ID Display -->
      <div class="container-white p-6 mb-6 text-center">
        <h2 class="text-2xl font-semibold text-black mb-4 font-mono uppercase tracking-wider">
          Room ID
        </h2>
        <div class="bg-gradient-to-r from-gray-100 to-gray-200 border-4 border-black p-4 mb-4">
          <div id="roomIdDisplay" class="text-black text-3xl font-bold font-mono tracking-widest">
            ABC123
          </div>
        </div>
        <p class="text-black font-mono text-sm">
          Another player can join the room using the room ID
        </p>
      </div>
      
      <!-- Waiting for Player -->
      <div id="waitingForPlayerSection" class="container-white p-6 mb-6 text-center">
        <div class="text-gray-500 font-mono text-lg mb-2">⏳</div>
        <div class="text-black font-mono text-lg font-bold">
          Waiting for player to join...
        </div>
      </div>
      
      <!-- Controls -->
      <div class="space-y-4">
        <button 
          id="copyRoomIdBtn"
          class="btn-blue w-full">
          Copy Room ID
        </button>
        
        <button 
          id="startGameBtn"
          class="btn-green w-full hidden">
          Start Game
        </button>
        
        <button 
          id="cancelRoomBtn"
          class="btn-red w-full">
          Leave Room
        </button>
      </div>
    </div>
  </template>

  <!-- Join Room template -->
  <template id="joinRoomTemplate">
    <div class="container-main-pink max-w-lg">
      <div class="text-center mb-8">
        <pre class="font-mono text-black text-1xl font-bold drop-shadow-lg">_|_|_|      _|_|    _|      _|    _|_|_|
_|    _|  _|    _|  _|_|    _|  _|      
_|_|_|    _|    _|  _|  _|  _|  _|  _|_|
_|        _|    _|  _|    _|_|  _|    _|
_|          _|_|    _|      _|    _|_|_|</pre>
      </div>
      
      <h1 class="text-4xl font-bold text-white mb-6 drop-shadow-lg text-center">
        Join Room
      </h1>
      
      <!-- Join Room Form -->
      <form id="joinRoomForm" class="space-y-6">
        <div class="container-white p-6">
          <h2 class="text-2xl font-semibold text-black mb-4 text-center font-mono uppercase tracking-wider">
            Enter Room ID
          </h2>
          
          <input 
            type="text" 
            id="roomIdInput" 
            name="roomId"
            placeholder="ABC123" 
            required 
            maxlength="10"
            class="input-white text-center text-2xl font-mono tracking-widest uppercase"
            autocomplete="off"
          >
          
          <p class="text-black font-mono text-sm mt-4 text-center">
            Enter the room ID provided by the room creator
          </p>
        </div>
        
        <!-- Form Controls -->
        <div class="space-y-4">
          <button 
            type="submit"
            id="joinRoomSubmitBtn"
            class="btn-green w-full">
            🚪 Join Room
          </button>
          
          <button 
            type="button"
            id="backToRemoteOptionsBtn"
            class="btn-blue w-full">
            ← Back to Options
          </button>
        </div>
      </form>
      
      <!-- Error/Status Messages -->
      <div id="joinRoomError" class="text-red-500 text-center mt-4 font-mono hidden"></div>
      <div id="joinRoomStatus" class="text-black text-center mt-4 font-mono hidden"></div>
    </div>
  </template>

  <!-- Random Match Lobby template -->
  <template id="randomMatchTemplate">
    <div class="container-main-pink max-w-lg">
      <div class="text-center mb-8">
        <pre class="font-mono text-black text-1xl font-bold drop-shadow-lg">_|_|_|      _|_|    _|      _|    _|_|_|
_|    _|  _|    _|  _|_|    _|  _|      
_|_|_|    _|    _|  _|  _|  _|  _|  _|_|
_|        _|    _|  _|    _|_|  _|    _|
_|          _|_|    _|      _|    _|_|_|</pre>
      </div>
      
      <h1 class="text-4xl font-bold text-white mb-6 drop-shadow-lg text-center">
        Matchmaking
      </h1>
      
      <!-- Matchmaking Status -->
      <div class="container-white p-6 mb-6 text-center">
        <div id="matchmakingStatusIcon" class="text-4xl mb-4">🔍</div>
        <div id="matchmakingStatusText" class="text-black font-mono text-lg font-bold mb-2">
          Searching for opponent...
        </div>
        <div id="matchmakingSubtext" class="text-black font-mono text-sm">
          You will be matched with another player looking for a game
        </div>
      </div>
      
      <!-- Queue Info -->
      <div class="container-white p-6 mb-6">
        <div class="text-center">
          <div id="playersInQueue" class="text-black text-2xl font-bold font-mono">1</div>
          <div class="text-black text-sm font-mono uppercase">Players in Queue</div>
        </div>
      </div>
      
      <!-- Loading Animation -->
      <div class="container-white p-6 mb-6 text-center">
        <div class="flex justify-center items-center space-x-2">
          <div class="w-3 h-3 bg-blue-500 rounded-full animate-bounce"></div>
          <div class="w-3 h-3 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
          <div class="w-3 h-3 bg-blue-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
        </div>
        <div class="text-black font-mono text-sm mt-3">
          <span id="searchTime">0:15</span> elapsed
        </div>
      </div>
      
      <!-- Match Found State (hidden by default) -->
      <div id="matchFoundSection" class="container-white p-6 mb-6 text-center hidden">
        <div class="text-4xl mb-4">🎉</div>
        <div class="text-black font-mono text-lg font-bold mb-2">
          Match Found!
        </div>
        <div class="text-black font-mono text-sm mb-4">
          Opponent: <span id="opponentName" class="font-bold">Player123</span>
        </div>
        <div class="text-black font-mono text-sm">
          Starting game in <span id="gameStartCountdown" class="font-bold">3</span> seconds...
        </div>
      </div>
      
      <!-- Controls -->
      <div class="space-y-4">
        <button 
          id="backToRemoteOptionsFromMatchBtn"
          class="btn-blue w-full">
          ← Back to Options
        </button>
      </div>
    </div>
  </template>

  <!-- Main application script -->
  <script type="module" src="index.ts"></script>
</body>
