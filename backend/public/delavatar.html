<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Delete Avatar</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .container { background: #222; padding: 20px; border-radius: 8px; max-width: 400px; width: 100%; text-align: center; }
    button { padding: 10px 20px; background: #dc3545; border: none; color: #fff; cursor: pointer; border-radius: 4px; }
    button:hover { background: #c82333; }
    #status { margin-top: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Delete Your Avatar</h2>
    <button id="delete">Delete Avatar</button>
    <div id="status"></div>
  </div>

  <script>
    const deleteBtn = document.getElementById('delete');
    const statusDiv = document.getElementById('status');

    deleteBtn.addEventListener('click', () => {
      fetch('/api/me/avatar', {
        method: 'DELETE',
        credentials: 'include' // send cookies for auth
      })
      .then(async (res) => {
        const text = await res.text();
        let msg;
        try { msg = JSON.parse(text).message; } catch { msg = text; }

        if (res.ok) {
          statusDiv.textContent = msg || 'Avatar deleted successfully!';
        } else {
          statusDiv.textContent = `Error: ${msg || res.statusText}`;
        }
      })
      .catch(() => {
        statusDiv.textContent = 'Network error occurred.';
      });
    });
  </script>
</body>
</html>
