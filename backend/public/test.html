<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Dashboard</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; }
    form { margin-bottom: 2rem; }
    label, input { display: block; margin-top: 0.5rem; }
    button { margin-top: 1rem; }
  </style>
</head>
<body>

  <h1>User Settings</h1>

  <form id="updatePasswordForm">
    <h2>Change Password</h2>
    <label>New Password: <input type="password" name="password" required /></label>
    <button type="submit">Update Password</button>
  </form>

  <form id="updateEmailForm">
    <h2>Change Email</h2>
    <label>New Email: <input type="email" name="email" required /></label>
    <button type="submit">Update Email</button>
  </form>

  <form id="updateUsernameForm">
    <h2>Change Username</h2>
    <label>New Username: <input type="text" name="username" required /></label>
    <button type="submit">Update Username</button>
  </form>

  <form id="deleteAccountForm">
    <h2>Delete Account</h2>
    <label>Confirm Password: <input type="password" name="password" required /></label>
    <button type="submit" style="color: red;">Delete My Account</button>
  </form>

  <div id="response"></div>

  <script>
    async function postData(url, method, data) {
      const res = await fetch(url, {
        method,
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const result = await res.json().catch(() => ({}));
      document.getElementById('response').textContent = JSON.stringify(result, null, 2);
    }

    document.getElementById('updatePasswordForm').onsubmit = e => {
      e.preventDefault();
      const password = e.target.password.value;
      postData('/api/me/password', 'PATCH', { password });
    };

    document.getElementById('updateEmailForm').onsubmit = e => {
      e.preventDefault();
      const email = e.target.email.value;
      postData('/api/me/email', 'PATCH', { email });
    };

    document.getElementById('updateUsernameForm').onsubmit = e => {
      e.preventDefault();
      const username = e.target.username.value;
      postData('/api/me/username', 'PATCH', { username });
    };

    document.getElementById('deleteAccountForm').onsubmit = e => {
      e.preventDefault();
      const password = e.target.password.value;
      if (confirm("Are you sure you want to delete your account?")) {
        postData('/api/me/delete', 'POST', { password });
      }
    };
  </script>
</body>
</html>
